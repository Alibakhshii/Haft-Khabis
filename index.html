function shade(hex, percent) {
  const num = parseInt(hex.replace("#", ""), 16);
  let r = (num >> 16) + percent;
  let g = ((num >> 8) & 0x00ff) + percent;
  let b = (num & 0x0000ff) + percent;
  r = Math.max(Math.min(255, r), 0);
  g = Math.max(Math.min(255, g), 0);
  b = Math.max(Math.min(255, b), 0);
  return "#" + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

        synth = new Tone.Synth({ oscillator: { type: "triangle" }, envelope: { attack: 0.005, decay: 0.12, sustain: 0, release: 0.1 } }).toDestination();
        noiseSynth = new Tone.NoiseSynth({ noise: { type: "white" }, envelope: { attack: 0.01, decay: 0.18, sustain: 0 } }).toDestination();
        fanfareSynth = new Tone.PolySynth(Tone.Synth).toDestination();
      } catch (e) { /* audio unavailable */ }
    }
  }
  return {
    setEnabled(v) { enabled = v; },
    isEnabled() { return enabled; },
    async click() { if (!enabled) return; await ensure(); try { synth.triggerAttackRelease("C6", "32n"); } catch (e) {} },
    async deal() { if (!enabled) return; await ensure(); try { noiseSynth.triggerAttackRelease("8n"); } catch (e) {} },
    async submit() {
      if (!enabled) return; await ensure();
      try { const now = Tone.now(); synth.triggerAttackRelease("E5", "16n", now); synth.triggerAttackRelease("G5", "16n", now + 0.09); } catch (e) {}
    },
    async eliminate() {
      if (!enabled) return; await ensure();
      try { const now = Tone.now(); synth.triggerAttackRelease("A3", "8n", now); synth.triggerAttackRelease("F3", "8n", now + 0.16); synth.triggerAttackRelease("D3", "4n", now + 0.32); } catch (e) {}
    },
    async trash() {
      if (!enabled) return; await ensure();
      try { const now = Tone.now(); synth.triggerAttackRelease("G4", "16n", now); synth.triggerAttackRelease("C4", "8n", now + 0.07); } catch (e) {}
    },
    async fanfare() {
      if (!enabled) return; await ensure();
      try {
        const now = Tone.now();
        fanfareSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n", now);
        fanfareSynth.triggerAttackRelease(["D5", "F5", "A5"], "8n", now + 0.22);
        fanfareSynth.triggerAttackRelease(["E5", "G5", "C6"], "4n", now + 0.44);
      } catch (e) {}
    },
  };
})();

const UNISEX_NAMES = new Set(["شادی","کیان","نور","رها","ترنم","آسمان","ایلیا","آرام","سایه","مهر","الیا","ایمان","یاس","شکیبا","پرهام","آوین","دریا","بارانا","ماهان","آرمیتا"]);

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return h;
}
// Suffix patterns that are strong (but not certain) signals in Persian names.
// Used only as a fallback guess when a name isn't in the curated lists above.
const FEMALE_SUFFIX_HINTS = ["ناز","دخت","تاج","بانو","نوش","گل","آسا","سا","نیا","تا","یتا","یسا"];
const MALE_SUFFIX_HINTS = ["فر","مهر","یار","دین","بد","داد","وند","مرد","شاه","خان"];

function detectGender(name) {
  const clean = (name || "").trim().split(" ")[0];
  if (!clean) return { gender: "boy", confidence: "low" };
  if (UNISEX_NAMES.has(clean)) return { gender: hashStr(clean) % 2 === 0 ? "boy" : "girl", confidence: "ambiguous" };
  if (FEMALE_NAMES.has(clean)) return { gender: "girl", confidence: "high" };
  if (MALE_NAMES.has(clean)) return { gender: "boy", confidence: "high" };
  for (const suf of FEMALE_SUFFIX_HINTS) if (clean.endsWith(suf)) return { gender: "girl", confidence: "low" };
  for (const suf of MALE_SUFFIX_HINTS) if (clean.endsWith(suf)) return { gender: "boy", confidence: "low" };
  return { gender: hashStr(clean) % 2 === 0 ? "boy" : "girl", confidence: "low" };
}
// Back-compat simple accessor used wherever only a name (no explicit stored gender) is available.
function getGender(name) {
  return detectGender(name).gender;
}
function fmtDate(ts) {
  try {
    return new Date(ts).toLocaleDateString("fa-IR", {
      year: "numeric", month: "long", day: "numeric", hour: "2-digit", minute: "2-digit",
    });
  } catch {
    return "";
  }
}
function rankPlayers(players) {
  const sorted = [...players].sort((a, b) => a.total - b.total);
  return sorted.map((p, i) => ({ ...p, rank: i + 1 }));
}
function rankEmoji(rank, eliminated) {
  if (eliminated) return "💀";
  if (rank === 1) return "👑";
  if (rank === 2) return "🥈";
  if (rank === 3) return "🥉";
  return "🃏";
}

  const disaster = sorted[sorted.length - 1];
  let text = pick(HERO_LINES).replace("{hero}", hero.name).replace("{heroScore}", hero.score);
  if (disaster.name !== hero.name) {
    text += "\n\n" + pick(DISASTER_LINES).replace("{disaster}", disaster.name).replace("{disasterScore}", disaster.score);
  }
  if (eliminatedNames.length) {
    text += "\n\n" + pick(ELIMINATION_LINES).replace("{names}", eliminatedNames.join("، "));
  }

      <div style={{ display: "flex", gap: s(6), marginTop: s(-2), zIndex: 1 }}>

function App() {
  const [loading, setLoading] = useState(true);
  const [screen, setScreen] = useState("home");
  const [prevScreen, setPrevScreen] = useState("game");

  const [savedPlayers, setSavedPlayers] = useState([]);
  const [setupPlayers, setSetupPlayers] = useState([]);
  const [nameInput, setNameInput] = useState("");

  const [game, setGame] = useState(null);
  const [history, setHistory] = useState([]);
  const [viewingGame, setViewingGame] = useState(null);

  const [roundInputs, setRoundInputs] = useState({});
  const [eliminationQueue, setEliminationQueue] = useState([]);
  const [celebration, setCelebration] = useState(null);
  const [roundPanel, setRoundPanel] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const [undoSnapshot, setUndoSnapshot] = useState(null);
  const [confirmDialog, setConfirmDialog] = useState(null);

  const colorCursor = useRef(0);

  useEffect(() => {
    (async () => {
      const sp = await storageGet("saved-players");
      const hist = await storageGet("game-history");
      const active = await storageGet("active-game");
      if (sp) setSavedPlayers(sp);
      if (hist) setHistory(hist);
      if (active) setGame(active);
      setLoading(false);
    })();
  }, []);

  function nextColor(usedColors) {
    let idx = colorCursor.current % PLAYER_COLORS.length;
    let tries = 0;
    while (usedColors.includes(PLAYER_COLORS[idx]) && tries < PLAYER_COLORS.length) {
      idx = (idx + 1) % PLAYER_COLORS.length;
      tries++;
    }
    colorCursor.current += 1;
    return PLAYER_COLORS[idx];
  }

  function addNewPlayer() {
    const name = nameInput.trim();
    if (!name) return;
    soundManager.click();
    if (setupPlayers.some((p) => p.name === name)) { setNameInput(""); return; }
    const used = setupPlayers.map((p) => p.color);
    setSetupPlayers((s) => [...s, { id: uid(), name, color: nextColor(used), gender: detectGender(name).gender }]);
    setNameInput("");
  }
  function addSavedPlayer(sp) {
    if (setupPlayers.some((p) => p.name === sp.name)) return;
    const used = setupPlayers.map((p) => p.color);
    setSetupPlayers((s) => [...s, { id: uid(), name: sp.name, color: nextColor(used), gender: sp.gender || detectGender(sp.name).gender }]);
  }
  function removeSetupPlayer(id) {
    soundManager.trash();
    setSetupPlayers((s) => s.filter((p) => p.id !== id));
  }
  function toggleSetupGender(id) {
    soundManager.click();
    setSetupPlayers((s) => s.map((p) => (p.id === id ? { ...p, gender: p.gender === "girl" ? "boy" : "girl" } : p)));
  }
  async function removeSavedPlayer(id, e) {
    e.stopPropagation();
    soundManager.trash();
    const next = savedPlayers.filter((p) => p.id !== id);
    setSavedPlayers(next);
    await storageSet("saved-players", next);
  }

  async function startGame() {
    if (setupPlayers.length < 2) return;
    soundManager.deal();
    setUndoSnapshot(null);
    const gamePlayers = setupPlayers.map((p) => ({
      id: p.id, name: p.name, color: p.color, gender: p.gender,
      rounds: [], total: 0, eliminated: false, eliminatedAtRound: null, prevRank: null,
    }));
    const newGame = { id: uid(), startedAt: Date.now(), currentRound: 0, status: "active", players: gamePlayers };
    setGame(newGame);
    await storageSet("active-game", newGame);

    const existingNames = new Set(savedPlayers.map((p) => p.name));
    const additions = setupPlayers.filter((p) => !existingNames.has(p.name)).map((p) => ({ id: uid(), name: p.name, gender: p.gender }));
    if (additions.length) {
      const merged = [...savedPlayers, ...additions];
      setSavedPlayers(merged);
      await storageSet("saved-players", merged);
    }
    setSetupPlayers([]);
    setRoundInputs({});
    setScreen("game");
  }

  function updateRoundInput(playerId, value) {
    setRoundInputs((r) => ({ ...r, [playerId]: value }));
  }

  async function submitRound() {
    if (!game) return;
    const activePlayers = game.players.filter((p) => !p.eliminated);
    const missing = activePlayers.some((p) => {
      const v = roundInputs[p.id];
      return v === undefined || v === "" || isNaN(Number(v));
    });
    if (missing) return;

    setUndoSnapshot(game);

    const preRoundRanks = rankPlayers(game.players);
    const newRoundNumber = game.currentRound + 1;
    const newlyEliminated = [];

    const updatedPlayers = game.players.map((p) => {
      if (p.eliminated) return p;
      const score = Number(roundInputs[p.id]);
      const newTotal = p.total + score;
      const newRounds = [...p.rounds, { round: newRoundNumber, score, cumulative: newTotal }];
      const willBeEliminated = newTotal > ELIMINATION_LIMIT;
      if (willBeEliminated) newlyEliminated.push(p.name);
      const prevRank = preRoundRanks.find((x) => x.id === p.id)?.rank ?? null;
      return { ...p, rounds: newRounds, total: newTotal, eliminated: willBeEliminated, eliminatedAtRound: willBeEliminated ? newRoundNumber : null, prevRank };
    });

    const updatedGame = { ...game, players: updatedPlayers, currentRound: newRoundNumber };
    setGame(updatedGame);
    await storageSet("active-game", updatedGame);
    setRoundInputs({});
    soundManager.submit();
    vibrate(15);
    if (newlyEliminated.length) { setEliminationQueue(newlyEliminated); soundManager.eliminate(); vibrate([40, 60, 40]); }

    const ranked = rankPlayers(updatedPlayers);
    const roundData = activePlayers.map((ap) => {
      const rp = ranked.find((x) => x.id === ap.id);
      return { name: rp.name, score: Number(roundInputs[ap.id] || 0), total: rp.total, rank: rp.rank, eliminated: rp.eliminated };
    });
    setRoundPanel({ round: newRoundNumber, loading: true, text: null });
    const text = await generateRoundCommentary(newRoundNumber, roundData, newlyEliminated);
    setRoundPanel({ round: newRoundNumber, loading: false, text });
  }

  async function undoLastRound() {
    if (!undoSnapshot) return;
    soundManager.trash();
    vibrate(20);
    setGame(undoSnapshot);
    await storageSet("active-game", undoSnapshot);
    setUndoSnapshot(null);
    setRoundPanel(null);
    setEliminationQueue([]);
  }

  async function finishGameNow() {
    if (!game) return;
    setUndoSnapshot(null);
    const ranked = rankPlayers(game.players);
    const finished = { ...game, status: "finished", finishedAt: Date.now(), players: ranked };
    const newHistory = [finished, ...history];
    setHistory(newHistory);
    await storageSet("game-history", newHistory);
    await storageDelete("active-game");
    setGame(null);
    soundManager.fanfare();
    vibrate([30, 50, 30, 50, 90]);
    setCelebration({ top3: ranked.slice(0, 3), rest: ranked.slice(3) });
  }
  function endGame() {
    if (!game) return;
    soundManager.click();
    setConfirmDialog({
      title: "پایان بازی",
      message: "مطمئنی می‌خوای بازی رو همین‌جا تموم کنی؟",
      confirmLabel: "بله، تموم کن",
      danger: true,
      onConfirm: () => { setConfirmDialog(null); finishGameNow(); },
    });
  }

  function closeCelebration() { setCelebration(null); setScreen("home"); }
  function goTo(target, from) { soundManager.click(); if (from) setPrevScreen(from); setScreen(target); }
  function openHistoryDetail(g) { soundManager.click(); setViewingGame(g); setScreen("historyDetail"); }
  async function deleteGame(gameId) {
    soundManager.trash();
    vibrate(20);
    const next = history.filter((g) => g.id !== gameId);
    setHistory(next);
    await storageSet("game-history", next);
  }
  function requestDeleteGame(gameId) {
    soundManager.click();
    setConfirmDialog({
      title: "حذف بازی",
      message: "این بازی برای همیشه از تاریخچه حذف بشه؟",
      confirmLabel: "بله، حذف کن",
      danger: true,
      onConfirm: () => { setConfirmDialog(null); deleteGame(gameId); },
    });
  }
  function toggleSound() { const next = !soundOn; setSoundOn(next); soundManager.setEnabled(next); if (next) soundManager.click(); }

  const activeGamePlayers = game ? rankPlayers(game.players) : [];
  const roundLabel = (n) => `دست ${n} ${SUITS[(n - 1) % 4]}`;

  function buildChartData(players) {
    const maxRound = players.reduce((m, p) => Math.max(m, p.rounds.length ? p.rounds[p.rounds.length - 1].round : 0), 0);
    const data = [];
    for (let r = 1; r <= maxRound; r++) {
      const row = { round: r };
      players.forEach((p) => {
        const entry = p.rounds.find((rr) => rr.round === r);
        row[p.name] = entry ? entry.cumulative : null;
      });
      data.push(row);
    }
    return data;
  }

  if (loading) {
    return (
      <div style={{ background: "#0A0E0A", minHeight: "100vh" }} className="flex items-center justify-center">
        <div style={{ color: "#D4AF37" }} className="text-lg" dir="rtl">در حال بارگذاری…</div>
      </div>
    );
  }

  return (
    <div dir="rtl" style={{ minHeight: "100vh", background: "#0A0E0A", color: "#EDEAE0", fontFamily: "'Vazirmatn', sans-serif", position: "relative", overflowX: "hidden" }}>
      <GlobalStyle />

      <button onClick={toggleSound} style={{
        position: "fixed", top: 16, left: 16, zIndex: 70, background: "rgba(10,14,10,0.7)",
        border: "1px solid rgba(212,175,55,0.35)", borderRadius: 999, width: 40, height: 40,
        display: "flex", alignItems: "center", justifyContent: "center", color: "#D4AF37", cursor: "pointer",
        backdropFilter: "blur(6px)",
      }} title={soundOn ? "بی‌صدا کردن" : "فعال کردن صدا"} aria-label={soundOn ? "بی‌صدا کردن" : "فعال کردن صدا"}>
        {soundOn ? "🔊" : "🔇"}
      </button>

      <div key={screen} className="screen-enter">
        {screen === "home" && (
          <HomeScreen hasActiveGame={!!game} onStart={() => goTo("setup")} onResume={() => goTo("game")} onHistory={() => goTo("history", "home")} onStats={() => goTo("stats", "home")} />
        )}
        {screen === "setup" && (
          <SetupScreen setupPlayers={setupPlayers} savedPlayers={savedPlayers} nameInput={nameInput} setNameInput={setNameInput}
            onAdd={addNewPlayer} onAddSaved={addSavedPlayer} onRemove={removeSetupPlayer} onRemoveSaved={removeSavedPlayer}
            onToggleGender={toggleSetupGender}
            onStart={startGame} onBack={() => goTo("home")} />
        )}
        {screen === "game" && game && (
          <GameScreen game={game} rankedPlayers={activeGamePlayers} roundLabel={roundLabel} roundInputs={roundInputs}
            updateRoundInput={updateRoundInput} onSubmitRound={submitRound} onEndGame={endGame}
            canUndo={!!undoSnapshot} onUndo={undoLastRound}
            onAnalysis={() => goTo("analysis", "game")} onChart={() => goTo("chart", "game")} onBack={() => goTo("home")} />
        )}
        {screen === "analysis" && (
          <AnalysisScreen players={game ? game.players : viewingGame ? viewingGame.players : []} roundLabel={roundLabel}
            onBack={() => goTo(prevScreen === "historyDetail" ? "historyDetail" : "game")} />
        )}
        {screen === "chart" && (
          <ChartScreen players={game ? game.players : viewingGame ? viewingGame.players : []} buildChartData={buildChartData}
            onBack={() => goTo(prevScreen === "historyDetail" ? "historyDetail" : "game")} />
        )}
        {screen === "history" && (
          <HistoryScreen history={history} onOpen={openHistoryDetail} onDelete={requestDeleteGame} onBack={() => goTo("home")} />
        )}
        {screen === "stats" && (
          <StatsScreen history={history} onBack={() => goTo("home")} />
        )}
        {screen === "historyDetail" && viewingGame && (
          <HistoryDetailScreen g={viewingGame} onAnalysis={() => goTo("analysis", "historyDetail")} onChart={() => goTo("chart", "historyDetail")} onBack={() => goTo("history")} />
        )}
      </div>

      {eliminationQueue.length > 0 && (
        <EliminationModal names={eliminationQueue} onClose={() => setEliminationQueue([])} />
      )}

      {roundPanel && (
        <RoundAnalysisPanel panel={roundPanel} roundLabel={roundLabel} onClose={() => setRoundPanel(null)} />
      )}

      {celebration && (
        <CelebrationOverlay celebration={celebration} onClose={closeCelebration} />
      )}

      {confirmDialog && (
        <ConfirmModal dialog={confirmDialog} onCancel={() => { soundManager.click(); setConfirmDialog(null); }} />
      )}
    </div>
  );
}

function HomeScreen({ hasActiveGame, onStart, onResume, onHistory, onStats }) {
  const cardSpecs = [
    { suit: "♠", top: "12%", left: "8%", r0: "-14deg", r1: "-8deg", delay: "0s" },
    { suit: "♥", top: "62%", left: "12%", r0: "10deg", r1: "16deg", delay: "0.6s" },
    { suit: "♦", top: "20%", left: "82%", r0: "16deg", r1: "10deg", delay: "0.3s" },
    { suit: "♣", top: "68%", left: "80%", r0: "-10deg", r1: "-4deg", delay: "0.9s" },
    { suit: "♥", top: "8%", left: "45%", r0: "6deg", r1: "-2deg", delay: "1.2s" },
  ];
  const sparkles = Array.from({ length: 14 }, (_, i) => ({
    left: `${(i * 23) % 100}%`, top: `${(i * 41) % 100}%`, delay: `${(i % 7) * 0.6}s`, dur: `${3 + (i % 4)}s`,
  }));

  return (

function moodTitle(mood) {
  switch (mood) {
    case "happy": return "در اوج قدرت";
    case "confident": return "روی روال";
    case "worried": return "کمی نگران";
    case "pouty": return "رو لبه پرتگاه";
    case "crying": return "در آستانه سقوط";
    case "devastated": return "از میدون به در شد";
    default: return "";
  }
}

function rankArrow(p) {
  if (typeof p.prevRank !== "number") return null;
  if (p.rank < p.prevRank) return <span style={{ color: "#4CC38A", fontSize: 12 }}>▲</span>;
  if (p.rank > p.prevRank) return <span style={{ color: "#E48098", fontSize: 12 }}>▼</span>;
  return <span style={{ color: "#8A9188", fontSize: 12 }}>–</span>;
}

const thStyle = { textAlign: "right", padding: "10px 14px", fontSize: 13, color: "#9CAA9C", borderBottom: "1px solid rgba(237,234,224,0.15)" };
const tdStyle = { textAlign: "right", padding: "10px 14px", fontSize: 14 };

function smoothPath(points) {
  if (points.length === 0) return "";
  if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i - 1] || points[i];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2] || p2;
    const cp1x = p1.x + (p2.x - p0.x) / 6;
    const cp1y = p1.y + (p2.y - p0.y) / 6;
    const cp2x = p2.x - (p3.x - p1.x) / 6;
    const cp2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

function ChartScreen({ players, buildChartData, onBack }) {
  const data = buildChartData(players);
  const maxRound = data.length;
  const svgRef = useRef(null);
  const [hoverRound, setHoverRound] = useState(null);
  const [hidden, setHidden] = useState(() => new Set());
  const [focused, setFocused] = useState(null);

  let maxY = 50;
  data.forEach((row) => players.forEach((p) => { const v = row[p.name]; if (v != null && v > maxY) maxY = v; }));
  maxY = Math.ceil(maxY / 50) * 50;

  // Bigger canvas with more vertical room so lines have space to breathe instead of bunching together.
  const W = 680, H = 480, padL = 46, padR = 18, padT = 20, padB = 36;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const xFor = (round) => padL + ((round - 1) / Math.max(maxRound - 1, 1)) * chartW;
  const yFor = (val) => padT + chartH - (val / maxY) * chartH;
  const baseY = padT + chartH;
  const xLabelStep = Math.max(1, Math.ceil(maxRound / 10));

  function toggleHidden(name, e) {
    if (e) e.stopPropagation();
    soundManager.click();
    setHidden((prev) => {
      const next = new Set(prev);
      if (next.has(name)) next.delete(name); else next.add(name);
      return next;
    });
    setFocused((f) => (f === name ? null : f));
  }
  function toggleFocus(name) {
    if (hidden.has(name)) { toggleHidden(name); return; }
    soundManager.click();
    setFocused((f) => (f === name ? null : name));
  }

  function handlePointer(e) {
    if (!svgRef.current || maxRound === 0) return;
    const rect = svgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const scaleX = W / rect.width;
    const localX = (clientX - rect.left) * scaleX;
    const ratio = Math.min(1, Math.max(0, (localX - padL) / chartW));
    const round = Math.round(1 + ratio * (maxRound - 1));
    setHoverRound(Math.min(maxRound, Math.max(1, round)));
  }

  const visiblePlayers = players.filter((p) => !hidden.has(p.name));
  const drawOrder = [...visiblePlayers].sort((a, b) => (focused === a.name ? 1 : 0) - (focused === b.name ? 1 : 0));
  const legendPlayers = [...players].sort((a, b) => a.total - b.total);
  const hoverRow = hoverRound ? data.find((r) => r.round === hoverRound) : null;
  const hoverRowSorted = hoverRow ? visiblePlayers.filter((p) => hoverRow[p.name] != null).sort((a, b) => hoverRow[a.name] - hoverRow[b.name]) : [];

  return (
    <div className="felt-bg" style={{ minHeight: "100vh", padding: "20px 16px 60px" }}>
      <TopBar title="نمودار عملکرد بازیکنان" onBack={onBack} />
      <div style={{ maxWidth: 900, margin: "20px auto 0" }}>
        {data.length === 0 ? (
          <div style={{ color: "#8A9188", textAlign: "center", marginTop: 60, fontSize: 15, lineHeight: 2 }}>
            هنوز دستی ثبت نشده.<br />بعد از اولین دست، روند امتیازها اینجا رسم می‌شه.
          </div>
        ) : (
          <div style={{
            background: "linear-gradient(160deg, rgba(237,234,224,0.055), rgba(237,234,224,0.02))",
            borderRadius: 20, padding: "22px 16px 18px", border: "1px solid rgba(212,175,55,0.15)",
            boxShadow: "0 20px 50px rgba(0,0,0,0.3)", position: "relative",
          }}>
            <div style={{ position: "relative" }}>
              <svg
                ref={svgRef} viewBox={`0 0 ${W} ${H}`} width="100%" style={{ overflow: "visible", touchAction: "none", cursor: "crosshair", display: "block" }}
                onMouseMove={handlePointer} onMouseLeave={() => setHoverRound(null)}
                onTouchMove={handlePointer} onTouchEnd={() => setHoverRound(null)}
              >
                <defs>
                  {players.map((p) => (
                    <linearGradient key={p.id} id={`area-${p.id}`} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={p.color} stopOpacity="0.32" />
                      <stop offset="100%" stopColor={p.color} stopOpacity="0" />
                    </linearGradient>
                  ))}
                  <filter id="lineGlowFocus" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur stdDeviation="3.6" result="blur" />
                    <feMerge>
                      <feMergeNode in="blur" />
                      <feMergeNode in="SourceGraphic" />
                    </feMerge>
                  </filter>
                </defs>

                {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                  const y = padT + chartH * (1 - f);
                  return (
                    <g key={i}>
                      <line x1={padL} y1={y} x2={W - padR} y2={y} stroke="rgba(237,234,224,0.08)" strokeDasharray="4 6" />
                      <text x={padL - 10} y={y + 4} fontSize="12" fill="#8A9188" textAnchor="end">{Math.round(maxY * f)}</text>
                    </g>
                  );
                })}
                {data.map((row, i) => (
                  (row.round % xLabelStep === 0 || row.round === 1 || row.round === maxRound) && (
                    <text key={i} x={xFor(row.round)} y={H - 10} fontSize="12" fill="#8A9188" textAnchor="middle">{row.round}</text>
                  )
                ))}

                {maxY >= ELIMINATION_LIMIT && (
                  <g>
                    <line x1={padL} x2={W - padR} y1={yFor(ELIMINATION_LIMIT)} y2={yFor(ELIMINATION_LIMIT)} stroke="#C4384F" strokeDasharray="7 5" strokeWidth="1.6" opacity="0.55" />
                    <text x={W - padR} y={yFor(ELIMINATION_LIMIT) - 8} fontSize="11" fill="#C4384F" textAnchor="end" opacity="0.85">خط حذف ۳۰۰</text>
                  </g>
                )}

                {drawOrder.map((p) => {
                  const pts = data.filter((row) => row[p.name] != null).map((row) => ({ round: row.round, x: xFor(row.round), y: yFor(row[p.name]) }));
                  if (pts.length === 0) return null;
                  const isFocused = focused === p.name;
                  const dim = focused && !isFocused;
                  const linePath = smoothPath(pts);
                  const areaPath = `${linePath} L ${pts[pts.length - 1].x} ${baseY} L ${pts[0].x} ${baseY} Z`;
                  const last = pts[pts.length - 1];
                  return (
                    <g key={p.id} style={{ transition: "opacity 0.25s ease" }} opacity={dim ? 0.14 : 1}>
                      {!dim && <path d={areaPath} fill={`url(#area-${p.id})`} stroke="none" />}
                      <path d={linePath} fill="none" stroke={p.color} strokeWidth={isFocused ? 4 : dim ? 1.6 : 2.6}
                        strokeLinejoin="round" strokeLinecap="round" filter={isFocused ? "url(#lineGlowFocus)" : "none"} />
                      {!dim && pts.map((pt, i) => (
                        <circle key={i} cx={pt.x} cy={pt.y} r={hoverRound === pt.round ? (isFocused ? 6.5 : 5) : (isFocused ? 4.5 : 3)} fill={p.color} stroke="#0A0E0A" strokeWidth="1.5" />
                      ))}
                      {isFocused && (
                        <g>
                          <rect x={last.x + 8} y={last.y - 11} width={Math.min(140, 14 + p.name.length * 8.5)} height={22} rx={11} fill="#0A0E0A" stroke={p.color} strokeWidth="1.2" />
                          <text x={last.x + 15} y={last.y + 5} fontSize="12" fontWeight="700" fill="#EDEAE0">{p.name}</text>
                        </g>
                      )}
                    </g>
                  );
                })}

                {hoverRow && (
                  <line x1={xFor(hoverRow.round)} x2={xFor(hoverRow.round)} y1={padT} y2={baseY} stroke="#D4AF37" strokeWidth="1.2" strokeDasharray="3 3" opacity="0.65" />
                )}
              </svg>

              {hoverRow && (
                <div style={{
                  position: "absolute", top: 4, left: `${Math.min(70, Math.max(2, (xFor(hoverRow.round) / W) * 100))}%`,
                  transform: xFor(hoverRow.round) / W > 0.55 ? "translateX(-100%)" : "none",
                  background: "rgba(10,14,10,0.96)", border: "1px solid rgba(212,175,55,0.45)", borderRadius: 12,
                  padding: "12px 14px", fontSize: 13, color: "#EDEAE0", pointerEvents: "none", minWidth: 150, maxWidth: 220,
                  boxShadow: "0 14px 32px rgba(0,0,0,0.5)", zIndex: 5,
                }}>
                  <div style={{ color: "#D4AF37", fontWeight: 800, marginBottom: 6, fontSize: 13 }}>دست {hoverRow.round}</div>
                  {hoverRowSorted.map((p, i) => (
                    <div key={p.id} style={{
                      display: "flex", alignItems: "center", gap: 7, marginTop: 3,
                      fontWeight: focused === p.name ? 800 : 500, opacity: focused && focused !== p.name ? 0.5 : 1,
                    }}>
                      <span style={{ color: "#6C726A", fontSize: 11, width: 14 }}>{i + 1}</span>
                      <span style={{ width: 9, height: 9, borderRadius: "50%", background: p.color, display: "inline-block", flexShrink: 0 }} />
                      <span style={{ flex: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</span>
                      <b>{hoverRow[p.name]}</b>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 20, justifyContent: "center" }}>
              {legendPlayers.map((p) => {
                const isHidden = hidden.has(p.name);
                const isFocused = focused === p.name;
                return (
                  <div key={p.id} onClick={() => toggleFocus(p.name)} role="button" tabIndex={0}
                    onKeyDown={(e) => { if (e.key === "Enter") toggleFocus(p.name); }}
                    aria-label={`${isFocused ? "برداشتن تمرکز از" : "تمرکز روی"} ${p.name}`}
                    style={{
                      display: "flex", alignItems: "center", gap: 7, fontSize: 13, cursor: "pointer",
                      background: isHidden ? "transparent" : isFocused ? `${p.color}2E` : `${p.color}14`,
                      border: `1.5px solid ${isHidden ? "rgba(237,234,224,0.15)" : isFocused ? p.color : p.color + "40"}`,
                      borderRadius: 999, padding: "6px 8px 6px 12px", color: isHidden ? "#5A605A" : "#EDEAE0",
                      transition: "all 0.15s ease", boxShadow: isFocused ? `0 0 0 3px ${p.color}22` : "none",
                    }}>
                    <span style={{ width: 9, height: 9, borderRadius: "50%", background: isHidden ? "#5A605A" : p.color, display: "inline-block", flexShrink: 0 }} />
                    <span style={{ textDecoration: isHidden ? "line-through" : "none" }}>{p.name}</span>
                    {!isHidden && <span style={{ color: "#9CAA9C", fontSize: 12 }}>{p.total}</span>}
                    <button onClick={(e) => toggleHidden(p.name, e)} aria-label={`${isHidden ? "نمایش" : "مخفی کردن"} خط ${p.name}`}
                      title={isHidden ? "نمایش دوباره" : "مخفی کردن خط"}
                      style={{
                        background: "rgba(255,255,255,0.06)", border: "none", borderRadius: "50%", width: 20, height: 20,
                        display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 11, color: "#B9C0B6", padding: 0,
                      }}>
                      {isHidden ? "＋" : "✕"}
                    </button>
                  </div>
                );
              })}
            </div>
            <div style={{ textAlign: "center", color: "#5A605A", fontSize: 11, marginTop: 12 }}>
              روی اسم بازیکن بزن تا فقط خط اون پررنگ بشه · روی ✕ بزن تا خط رو کلاً مخفی کنی · انگشتت رو روی نمودار بکش تا جزئیات هر دست رو ببینی
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function StatsScreen({ history, onBack }) {
  const map = {};
  history.forEach((g) => {
    g.players.forEach((p) => {
      if (!map[p.name]) map[p.name] = { name: p.name, games: 0, first: 0, second: 0, third: 0, scoreSum: 0, color: p.color, gender: p.gender };
      const m = map[p.name];
      m.games += 1;
      m.scoreSum += p.total;
      if (p.rank === 1) m.first += 1;
      else if (p.rank === 2) m.second += 1;
      else if (p.rank === 3) m.third += 1;
      m.color = p.color;
      m.gender = p.gender;
    });
  });
  const rows = Object.values(map).map((m) => ({
    ...m,
    avg: Math.round(m.scoreSum / m.games),
    winPct: Math.round((m.first / m.games) * 100),
  })).sort((a, b) => b.winPct - a.winPct || b.games - a.games);

  return (
    <div className="felt-bg" style={{ minHeight: "100vh", padding: "20px 16px 60px" }}>
      <TopBar title="آمار بازیکنان" onBack={onBack} />
      <div style={{ maxWidth: 800, margin: "20px auto 0" }}>
        {rows.length === 0 ? (
          <div style={{ color: "#8A9188", textAlign: "center", marginTop: 40 }}>هنوز آماری ثبت نشده — یه بازی رو تموم کن تا این صفحه پر بشه.</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {rows.map((r, i) => (
              <div key={r.name} className="fade-up player-card" style={{
                background: "rgba(255,255,255,0.045)", borderTop: `4px solid ${r.color}`, borderRadius: 14,
                padding: "16px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12,
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <Avatar name={r.name} gender={r.gender} mood={r.winPct >= 40 ? "happy" : r.winPct >= 15 ? "confident" : "worried"} size={48} />
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 16 }}>{r.name}</div>
                    <div style={{ color: "#8A9188", fontSize: 12 }}>{r.games} بازی</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 18, flexWrap: "wrap" }}>
                  <StatChip icon="🏆" label="اول" value={r.first} />
                  <StatChip icon="🥈" label="دوم" value={r.second} />
                  <StatChip icon="🥉" label="سوم" value={r.third} />
                  <StatChip label="میانگین امتیاز" value={r.avg} />
                  <StatChip label="درصد برد" value={`${r.winPct}%`} highlight />
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function CelebrationOverlay({ celebration, onClose }) {
  const { top3, rest } = celebration;
  const [shareMsg, setShareMsg] = useState("");
  const confetti = Array.from({ length: 24 }, (_, i) => ({
    suit: SUITS[i % 4], left: `${(i * 37) % 100}%`, delay: `${(i % 10) * 0.35}s`, duration: `${3 + (i % 4)}s`,
  }));

  async function shareResults() {
    soundManager.click();
    const all = [...top3, ...rest];
    const lines = all.map((p, i) => `${i + 1}. ${p.name} — ${p.total} امتیاز ${rankEmoji(p.rank, p.eliminated)}`);
    const text = `نتیجه بازی هفت خبیث 🃏\n\n${lines.join("\n")}`;
    try {
      if (navigator.share) {
        await navigator.share({ text });
      } else {
        await navigator.clipboard.writeText(text);
        setShareMsg("نتیجه کپی شد! برو توی گروه پیستش کن 📋");
        setTimeout(() => setShareMsg(""), 2500);
      }
    } catch (e) { /* user cancelled, ignore */ }
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "radial-gradient(circle at 50% 15%, #1A130A 0%, #05070500 60%), rgba(5,7,5,0.94)", zIndex: 60, overflow: "auto", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      {confetti.map((c, i) => (
        <div key={i} style={{ position: "absolute", top: -60, left: c.left, fontSize: 26, color: SUIT_COLOR[c.suit], animation: `fallDown ${c.duration} linear ${c.delay} infinite` }}>{c.suit}</div>
      ))}

      <div className="fade-up" style={{ textAlign: "center", zIndex: 2, maxWidth: 640, width: "100%" }}>
        <div style={{ fontSize: 40, marginBottom: 8 }}>✨</div>
        <h2 style={{ fontSize: "clamp(30px, 6vw, 44px)", fontWeight: 900, margin: "6px 0 30px", background: "linear-gradient(100deg, #F3E3A8, #C9A227, #F3E3A8)", backgroundSize: "200% auto", WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent", animation: "shimmerText 4s linear infinite" }}>
          بازی تمام شد! 🎉
        </h2>

        <div style={{ display: "flex", justifyContent: "center", alignItems: "flex-end", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
          {top3[1] && <PodiumCharacter p={top3[1]} place={2} height={90} />}
          {top3[0] && <PodiumCharacter p={top3[0]} place={1} height={120} />}
          {top3[2] && <PodiumCharacter p={top3[2]} place={3} height={70} />}
        </div>

        {rest.length > 0 && (
          <div className="fade-up" style={{ marginTop: 10, marginBottom: 26 }}>
            <div style={{ color: "#8A9188", fontSize: 13, marginBottom: 10 }}>بقیه رفقا... 😭</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 18, flexWrap: "wrap" }}>
              {rest.map((p, i) => (
                <div key={p.id} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, animation: `floorPound 0.6s ease-in-out ${i * 0.15}s infinite` }}>
                  <FullBodyCharacter player={p} pose="floor" scale={0.6} mood="crying" caption={i === 0 ? "دفعه بعد! 😭" : undefined} />
                  <div style={{ fontSize: 12, color: "#9CAA9C", marginTop: 2 }}>{p.name}</div>
                  <div style={{ fontSize: 16, animation: `fistThump 0.6s ease-in-out ${i * 0.15}s infinite` }}>✊😭</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
          <button onClick={onClose} className="btn-gold" style={{ border: "none", borderRadius: 12, padding: "13px 34px", cursor: "pointer", fontSize: 16 }}>
            بازگشت به خانه
          </button>
          <button onClick={shareResults} className="btn-ghost" style={{ border: "1px solid rgba(212,175,55,0.35)", borderRadius: 12, padding: "13px 24px", cursor: "pointer", fontSize: 15 }}>
            📤 اشتراک‌گذاری نتیجه
          </button>
        </div>
        {shareMsg && (
          <div className="fade-up" style={{ marginTop: 14, color: "#D4AF37", fontSize: 13 }}>{shareMsg}</div>
        )}
      </div>
    </div>
  );
}

function PodiumCharacter({ p, place, height }) {
  const anim = place === 1 ? "bounceWinner 1.1s ease-in-out infinite" : "bounceSmall 1.4s ease-in-out infinite";
  const scale = place === 1 ? 1 : place === 2 ? 0.82 : 0.72;
  const caption = place === 1 ? "قهرمانم! 🏆" : place === 2 ? "بد نبود‌ها! 😎" : "حداقل حذف نشدم 😅";
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
      <div style={{ animation: anim }}>
        <FullBodyCharacter player={p} pose="cheer" scale={scale} mood={place === 1 ? "happy" : "confident"} caption={caption} />
      </div>
      <div style={{ fontWeight: 800, color: p.color, fontSize: place === 1 ? 17 : 14, marginTop: 2 }}>{p.name}</div>
      <div style={{ color: "#9CAA9C", fontSize: 12 }}>{p.total} امتیاز</div>
      <div style={{
        width: 84, height, borderRadius: "10px 10px 0 0",
        background: `linear-gradient(180deg, ${p.color}55, ${p.color}22)`,
        border: `1px solid ${p.color}88`, display: "flex", alignItems: "flex-start", justifyContent: "center", paddingTop: 8,
        fontWeight: 900, fontSize: 20, color: p.color,
      }}>{place}</div>
    </div>
  );
}

const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(<App />);

</script>
</body>
</html>
